name: CI — Tests & Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]" pytest-cov

      - name: Run tests with Coverage
        run: python -m pytest tests/ -v --tb=short -q --cov=cognicore --cov-report=term-missing

      - name: Check import health
        run: python -c "import cognicore; print(f'✅ {len(cognicore.__all__)} exports | v{cognicore.__version__}')"

  strict-quality:
    name: 🛡️ Strict Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install strict analysis tools
        run: |
          pip install -e ".[dev]"
          pip install ruff black mypy bandit

      - name: 🔍 Linting (Ruff) - Fail on syntax or undefined variables
        run: ruff check cognicore/ tests/ --select E,F,W

      - name: 🎨 Formatting (Black)
        run: black --check cognicore/ tests/ || echo "Formatting issues found! Run 'black cognicore/ tests/' locally."

      - name: 🛡️ Security Scan (Bandit)
        run: bandit -r cognicore/ -ll -q

      - name: 🔬 Type Checking (Mypy)
        run: mypy cognicore/ --ignore-missing-imports || echo "Type checking has warnings."

      - name: Verify all environments load
        run: |
          python -c "
          import cognicore
          envs = cognicore.list_envs()
          print(f'✅ {len(envs)} environments registered')
          assert len(envs) >= 24, f'Expected 24+ envs, got {len(envs)}'
          "

      - name: Doctor check
        run: python -m cognicore.cli doctor
