name: CogniCore CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install gymnasium stable-baselines3 torch numpy

      - name: Run core tests
        run: pytest tests/ -x -q --tb=short

      - name: Verify gymnasium envs
        run: |
          python -c "
          import cognicore.gym
          import gymnasium as gym
          from gymnasium.utils.env_checker import check_env
          for eid in ['cognicore/MazeRunner-v0','cognicore/GridWorld-v0',
                      'cognicore/Trading-v0','cognicore/Survival-v0']:
              env = gym.make(eid)
              check_env(env.unwrapped, skip_render_check=True)
              print(f'  {eid}: PASSED')
              env.close()
          "

      - name: Verify SB3 compatibility
        run: |
          python -c "
          import cognicore.gym; import gymnasium as gym
          from stable_baselines3 import PPO
          from stable_baselines3.common.monitor import Monitor
          env = Monitor(gym.make('cognicore/GridWorld-v0'))
          PPO('MlpPolicy', env, verbose=0, n_steps=64, batch_size=32).learn(256)
          print('SB3: PASSED'); env.close()
          "
