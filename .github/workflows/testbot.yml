name: 📊 TestBot — Coverage Reporter

# Runs tests on every PR and posts a detailed coverage report
# as a comment, showing which modules are covered and which aren't

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-report:
    name: 🧪 Test & Coverage Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]" pytest-cov

      - name: 🧪 Run Tests with Coverage
        id: tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=cognicore --cov-report=json --cov-report=term-missing 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: 📊 Generate Coverage Report
        if: always()
        run: |
          python << 'PYEOF'
          import json, os

          report = []
          report.append("## 📊 TestBot Coverage Report\n")

          # Parse test output for pass/fail
          test_output = open("test_output.txt", "r").read()
          if "passed" in test_output:
              # Extract summary line
              for line in test_output.split("\n"):
                  if "passed" in line or "failed" in line:
                      report.append(f"**Test Result:** `{line.strip()}`\n")
                      break

          # Parse coverage JSON
          try:
              with open("coverage.json", "r") as f:
                  cov = json.load(f)

              total_pct = cov.get("totals", {}).get("percent_covered", 0)
              report.append(f"**Overall Coverage:** `{total_pct:.1f}%`\n")

              # Coverage by module
              report.append("\n| Module | Coverage | Lines | Missing |")
              report.append("|--------|----------|-------|---------|")

              files = cov.get("files", {})
              sorted_files = sorted(files.items(), key=lambda x: x[1].get("summary", {}).get("percent_covered", 0))

              for path, data in sorted_files:
                  summary = data.get("summary", {})
                  pct = summary.get("percent_covered", 0)
                  total = summary.get("num_statements", 0)
                  missing = summary.get("missing_lines", 0)

                  # Status emoji
                  if pct >= 80:
                      emoji = "🟢"
                  elif pct >= 50:
                      emoji = "🟡"
                  else:
                      emoji = "🔴"

                  short_path = path.replace("cognicore/", "")
                  report.append(f"| {emoji} `{short_path}` | {pct:.0f}% | {total} | {missing} |")

              # Recommendations
              low_cov = [(p, d) for p, d in files.items()
                         if d.get("summary", {}).get("percent_covered", 0) < 50]
              if low_cov:
                  report.append(f"\n### ⚠️ Low Coverage Modules ({len(low_cov)})\n")
                  for path, data in low_cov[:5]:
                      short = path.replace("cognicore/", "")
                      pct = data["summary"]["percent_covered"]
                      report.append(f"- `{short}` at **{pct:.0f}%** — needs more tests")

          except FileNotFoundError:
              report.append("⚠️ Coverage data not available")

          report.append(f"\n---\n*TestBot v1.0 • Automated Test Report*")

          body = "\n".join(report)
          print(body)

          with open("testbot_report.txt", "w") as f:
              f.write(body)
          PYEOF

      - name: 💬 Post Coverage Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('testbot_report.txt', 'utf8');
            } catch {
              body = '## 📊 TestBot\n\n⚠️ Could not generate report.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('📊 TestBot Coverage Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
