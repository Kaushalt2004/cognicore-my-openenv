name: 🤖 CodeGuardian Bot — PR Review

# This bot automatically reviews every PR:
# - Scans for print() statements in core code
# - Checks for missing type hints
# - Detects hardcoded secrets
# - Flags TODO/FIXME/HACK comments
# - Verifies all new functions have docstrings
# - Posts a detailed review comment on the PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'cognicore/**'
      - 'tests/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-review:
    name: 🔍 Automated Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: 🔍 Run CodeGuardian Analysis
        id: analysis
        run: |
          python << 'SCRIPT'
          import os, re, json, sys

          issues = []
          warnings = []
          suggestions = []
          stats = {"files": 0, "lines": 0, "functions": 0, "typed": 0, "untyped": 0}

          SKIP_DIRS = {"__pycache__", ".git", "node_modules", "dist", "build"}
          SECRET_PATTERNS = [
              r'(?:api[_-]?key|secret|password|token)\s*=\s*["\'][^"\']{8,}',
              r'sk-[a-zA-Z0-9]{20,}',
              r'pypi-[a-zA-Z0-9]{20,}',
              r'ghp_[a-zA-Z0-9]{36}',
              r'AKIA[0-9A-Z]{16}',
          ]

          for root, dirs, files in os.walk("cognicore"):
              dirs[:] = [d for d in dirs if d not in SKIP_DIRS]
              for fname in files:
                  if not fname.endswith(".py"):
                      continue
                  path = os.path.join(root, fname)
                  rel = path.replace("\\", "/")
                  stats["files"] += 1

                  with open(path, "r", encoding="utf-8", errors="ignore") as f:
                      lines = f.readlines()
                  stats["lines"] += len(lines)

                  for i, line in enumerate(lines, 1):
                      # Print statements in non-CLI code
                      if "cli.py" not in rel and re.match(r"^\s+print\(", line):
                          issues.append(f"⚠️ `{rel}:{i}` — `print()` in core code (use `logger` instead)")

                      # Hardcoded secrets
                      for pat in SECRET_PATTERNS:
                          if re.search(pat, line, re.IGNORECASE):
                              issues.append(f"🚨 `{rel}:{i}` — Possible hardcoded secret detected!")

                      # TODO/FIXME/HACK
                      for tag in ["TODO", "FIXME", "HACK", "XXX"]:
                          if f"# {tag}" in line:
                              comment = line.strip()
                              warnings.append(f"📝 `{rel}:{i}` — `{comment[:80]}`")

                  # Check functions for type hints and docstrings
                  content = "".join(lines)
                  func_pattern = re.compile(r"^\s*def\s+(\w+)\(([^)]*)\)", re.MULTILINE)
                  for match in func_pattern.finditer(content):
                      stats["functions"] += 1
                      func_name = match.group(1)
                      if func_name.startswith("_"):
                          continue
                      params = match.group(2)
                      line_num = content[:match.start()].count("\n") + 1

                      # Check return type hint
                      func_line = lines[line_num - 1] if line_num <= len(lines) else ""
                      if "->" not in func_line and func_name != "__init__":
                          stats["untyped"] += 1
                      else:
                          stats["typed"] += 1

          # Generate suggestions
          if stats["untyped"] > 0:
              pct = stats["typed"] / max(stats["typed"] + stats["untyped"], 1) * 100
              suggestions.append(f"📊 Type hint coverage: **{pct:.0f}%** ({stats['typed']}/{stats['typed']+stats['untyped']} public functions)")

          if stats["lines"] > 10000:
              suggestions.append("📦 Codebase is large ({:,} lines). Consider splitting into sub-packages.".format(stats["lines"]))

          # Build report
          report_lines = []
          report_lines.append("## 🤖 CodeGuardian Review\n")
          report_lines.append(f"**Scanned:** {stats['files']} files | {stats['lines']:,} lines | {stats['functions']} functions\n")

          if issues:
              report_lines.append(f"\n### 🚨 Issues ({len(issues)})\n")
              for issue in issues[:20]:
                  report_lines.append(f"- {issue}")
              if len(issues) > 20:
                  report_lines.append(f"\n*...and {len(issues)-20} more*")

          if warnings:
              report_lines.append(f"\n### 📝 Tracked Items ({len(warnings)})\n")
              for w in warnings[:10]:
                  report_lines.append(f"- {w}")

          if suggestions:
              report_lines.append(f"\n### 💡 Suggestions\n")
              for s in suggestions:
                  report_lines.append(f"- {s}")

          if not issues:
              report_lines.append("\n### ✅ No critical issues found!\n")
              report_lines.append("Code passes all automated checks.")

          report_lines.append(f"\n---\n*CodeGuardian v1.0 • CogniCore Automated Review*")

          report = "\n".join(report_lines)
          print(report)

          # Save for GitHub step
          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              # Escape for multiline
              escaped = report.replace("%", "%25").replace("\n", "%0A").replace("\r", "%0D")
              f.write(f"report<<EOF\n{report}\nEOF\n")
              f.write(f"issue_count={len(issues)}\n")
          SCRIPT

      - name: 💬 Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read the analysis output
            const output = fs.readFileSync(process.env.GITHUB_OUTPUT || '', 'utf8');
            const reportMatch = output.match(/report<<EOF\n([\s\S]*?)\nEOF/);
            
            if (!reportMatch) {
              console.log('No report generated');
              return;
            }

            const body = reportMatch[1];

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => 
              c.body.includes('🤖 CodeGuardian Review')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
