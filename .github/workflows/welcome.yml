name: 👋 Welcome

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { issue, pull_request } = context.payload;
            const item = issue || pull_request;
            const author = item.user.login;
            const isIssue = !!issue;

            // Check if first-time contributor
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all',
            });

            const isFirstTime = issues.length <= 1;

            if (isFirstTime) {
              const greeting = isIssue
                ? `👋 Welcome to **CogniCore**, @${author}! Thanks for opening your first issue.\n\n` +
                  `A maintainer will review this shortly. In the meantime:\n` +
                  `- 📖 Check our [README](https://github.com/Kaushalt2004/cognicore-my-openenv#readme)\n` +
                  `- 🧪 Run \`python -m cognicore.cli doctor\` to verify your setup\n` +
                  `- 💬 Feel free to add more details to help us understand the issue\n\n` +
                  `We aim to respond within 48 hours.`
                : `👋 Welcome to **CogniCore**, @${author}! Thanks for your first pull request! 🎉\n\n` +
                  `A maintainer will review your changes soon. Please make sure:\n` +
                  `- ✅ All tests pass (\`pytest tests/ -v\`)\n` +
                  `- 📝 You've described what your PR does\n` +
                  `- 🧪 New features include tests\n\n` +
                  `Thank you for contributing to CogniCore! 🧠`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: item.number,
                body: greeting,
              });
            }
